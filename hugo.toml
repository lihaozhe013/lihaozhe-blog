# 网站全局标题
title = "Haozhe Li's Blog"
# 最终部署的网址，本地测试时可以保留，部署前务必修改
baseURL = 'https://lihaozhe013.github.io/lihaozhe-blog/'
# 网站语言代码
languageCode = 'en-us'
# 主题名称
theme = "hugo-blog-awesome"

# 启用 emoji
enableEmoji = true
ignoreErrors = ["additional-script-loading-error"]

# --- 服务配置 ---
[services]
  # 谷歌分析，留空为禁用
  [services.googleAnalytics]
    id = '' # G-MEASUREMENT_ID
  # Disqus 评论，留空为禁用
  [services.disqus]
    shortname = ''

# --- Markdown 渲染配置 ---
[markup]
  [markup.highlight]
    # 确保代码高亮可用
    noClasses = false
  [markup.goldmark.renderer]
    # 允许在 Markdown 中使用原始 HTML
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2 # 目录从 H2 标题开始
    endLevel = 4   # 目录到 H4 标题结束
    ordered = false # 生成无序列表 (<ul>)

# --- 网站主菜单 ---
[menu]
  [[menu.main]]
    pageRef="/"
    name = 'Home'
    url = '/'
    weight = 10
  [[menu.main]]
    pageRef="posts"
    name = 'Posts'
    url = '/posts/'
    weight = 20
  [[menu.main]]
    pageRef="about"
    name = 'About'
    url = '/about/'
    weight = 30

# --- 全局参数 (替代了原来的 [Languages.en-gb.params]) ---
[params]
  sitename = "Haozhe Li's Portfolio"
  description = "A personal site and portfolio by Haozhe Li."
  defaultColor = "dark" # 颜色模式: dark, light, auto
  mainSections = ['posts']
  toc = true # 全局启用目录
  tocOpen = false # 目录默认不展开
  goToTop = true # 启用“返回顶部”按钮
  
  # 自定义脚本
  # additionalScripts = ['js/custom.js']
  
  # 日期格式，留空则使用默认 "2 Jan 2006"
  dateFormat = ""
  # RSS Feed 中包含的内容: "summary" 或 "full"
  rssFeedDescription = "summary"

  # 作者信息
  [params.author]
    avatar = "avatar.jpg" # 图片放在 assets/ 目录下
    intro = "Haozhe Li's Portfolio"
    name = "Haozhe Li"
    description = "Welcome to my personal website where I write about my portfolio."

  # 社交链接图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lihaozhe013"
  # 你可以继续添加更多社交链接
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/lihaozhe013"

  # PWA / 移动浏览器配置
  [params.webmanifest]
    name = "Haozhe Li's Portfolio"
    short_name = "Haozhe's Portfolio"
    start_url = "/"
    theme_color = "#434648"
    background_color = "#fff"
    display = "standalone"

  [params.browserconfig]
    TileColor = "#2d89ef"
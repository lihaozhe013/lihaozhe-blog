name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # 如果你的主题子模块是私有库且需要 PAT，请取消下一行注释并把 GH_PAT 存成仓库密钥
          # token: ${{ secrets.GH_PAT }}

      # 仅在存在 go.mod（Hugo Modules）时安装 Go
      - name: Detect Hugo Modules (go.mod)
        id: detect_mod
        run: |
          if [ -f go.mod ]; then
            echo "has_mod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_mod=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go (for Hugo Modules)
        if: steps.detect_mod.outputs.has_mod == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"
          extended: true

      # 计算 baseURL：优先使用 static/CNAME，其次判断是否为用户主页仓库
      - name: Compute baseURL
        id: baseurl
        shell: bash
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${{ github.repository_owner }}"
          BASE_URL=""
          if [ -f ./static/CNAME ]; then
            DOMAIN="$(tr -d '\n\r ' < ./static/CNAME)"
            BASE_URL="https://${DOMAIN}/"
          elif [ "$REPO" = "${OWNER}.github.io" ]; then
            BASE_URL="https://${OWNER}.github.io/"
          else
            BASE_URL="https://${OWNER}.github.io/${REPO}/"
          fi
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Using baseURL: ${BASE_URL}"

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify --enableGitInfo --baseURL "${{ steps.baseurl.outputs.base_url }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4